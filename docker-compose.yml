services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zitata
      POSTGRES_USER: zitata
      POSTGRES_PASSWORD: zitata_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zitata"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  asr:
    build: ./asr
    ports:
      - "8001:8001"
    volumes:
      - shared_downloads:/app/downloads

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://zitata:zitata_dev@db:5432/zitata
      REDIS_URL: redis://redis:6379
      ASR_URL: http://asr:8001
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID:-}
      DOWNLOAD_DIR: /app/downloads
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      asr:
        condition: service_started
    volumes:
      - shared_downloads:/app/downloads

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
  shared_downloads:
